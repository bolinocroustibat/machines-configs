- name: Ensure SSH rule is present
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "Allow SSH (IMPORTANT) - managed by Ansible role ufw"
  become: true

- name: Set default policy for outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing
  become: true

- name: Set default policy for incoming traffic
  community.general.ufw:
    default: deny
    direction: incoming
  become: true

- name: Configure UFW rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw__rules }}"
  when: ufw__rules | length > 0
  become: true

- name: Reload UFW
  community.general.ufw:
    state: reloaded
  become: true
