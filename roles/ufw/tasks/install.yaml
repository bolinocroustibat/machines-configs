- name: Install UFW
  apt:
    name: ufw
    state: present
    update_cache: true
  become: true

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
  become: true

- name: Set default policies
  community.general.ufw:
    default: "{{ item }}"
  loop:
    - deny
    - allow
  become: true

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "Allow SSH (IMPORTANT) - managed by Ansible role ufw"
  become: true

- name: Enable UFW and persist across reboots
  community.general.ufw:
    state: enabled
    logging: 'on'
  register: ufw_enable
  become: true

- name: Reload UFW
  community.general.ufw:
    state: reloaded
  when: ufw_enable.changed
  become: true
