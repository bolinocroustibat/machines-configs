- name: Install UFW
  apt:
    name: ufw
    state: present
    update_cache: true
  become: true

- name: Allow SSH before enabling UFW or setting default deny incoming
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "Allow SSH (IMPORTANT) - managed by Ansible role ufw"
  become: true

- name: Set default policy for outgoing traffic
  community.general.ufw:
    default: allow
    direction: outgoing
  become: true

- name: Set default policy for incoming traffic
  community.general.ufw:
    default: deny
    direction: incoming
  become: true

- name: Enable UFW and persist across reboots
  community.general.ufw:
    state: enabled
    logging: 'on'
  register: ufw_enable
  become: true

- name: Reload UFW
  community.general.ufw:
    state: reloaded
  when: ufw_enable.changed
  become: true
