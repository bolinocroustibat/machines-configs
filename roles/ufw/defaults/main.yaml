# Stock /etc/ufw/sysctl.conf can call sysctl keys missing on some kernels (e.g. OSMC); use an empty/minimal file before enable.
ufw__minimal_sysctl: false

# Optional: port sshd listens on (as seen by UFW on this machine). If unset, uses ansible_port, then 22.
# If you only use a router forward (e.g. WAN:2222 -> LAN:22), set ufw__ssh_listen_port: 22 on that host.

# UFW rules per host
# SSH is configured in install.yaml before UFW is enabled
# Each rule should have: port, proto (default: tcp), and comment
# Example:
# ufw__rules:
#   - { port: http, proto: tcp, comment: "Allow HTTP - managed by Ansible role ufw" }
#   - { port: https, proto: tcp, comment: "Allow HTTPS - managed by Ansible role ufw" }
#   - { port: 9091, proto: tcp, comment: "Allow Transmission web interface - managed by Ansible role ufw" }
ufw__rules: []
