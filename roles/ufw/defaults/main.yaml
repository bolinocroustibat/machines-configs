# Base UFW rules applied to all hosts
# SSH is configured separately in install.yaml and rules.yaml to ensure it's always open
# Each rule should have: port, proto (default: tcp), and comment
ufw__rules:
  - { port: http, proto: tcp, comment: "Allow HTTP - managed by Ansible role ufw" }
  - { port: https, proto: tcp, comment: "Allow HTTPS - managed by Ansible role ufw" }
  - { port: 443, proto: udp, comment: "Allow QUIC HTTP/3 - managed by Ansible role ufw" }
