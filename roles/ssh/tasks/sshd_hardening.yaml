- name: Ensure sshd_config.d exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: u=rwx,g=rx,o=rx  # 755
  become: true

- name: Ensure sshd includes drop-in configuration files
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    line: Include /etc/ssh/sshd_config.d/*.conf
    insertbefore: BOF
    state: present
  register: sshd_include_dropins_line
  become: true

- name: Deploy sshd hardening drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
    mode: u=rw,g=r,o=r  # 644
  register: ssh_hardening_file
  become: true

- name: Restart ssh so hardening takes effect
  ansible.builtin.service:
    name: ssh
    state: restarted
  when: ssh_hardening_file is changed or sshd_include_dropins_line is changed
  become: true
