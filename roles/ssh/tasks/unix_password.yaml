# Set Linux password hashes for local users (e.g. unlock accounts with no password in /etc/shadow).
# Does not enable SSH password authentication; sshd remains key-only if hardened separately.
# Add optional unix_password_hash (SHA-512 crypt) on entries in shell_users_list (host_vars, git-crypt/vault).

- name: Apply UNIX password hashes from shell_users_list
  ansible.builtin.user:
    name: "{{ item.user }}"
    password: "{{ item.unix_password_hash }}"
    password_lock: false
    update_password: always
  loop: "{{ shell_users_list | default([]) | selectattr('unix_password_hash', 'defined') | list }}"
  become: true
  when: (shell_users_list | default([]) | selectattr('unix_password_hash', 'defined') | list | length) > 0
