- name: Allow Portainer agent from data-bolino
  ufw:
    rule: allow
    port: 9001
    proto: tcp
    from_ip: "{{ hostvars['data-bolino']['ansible_host'] }}"
    comment: "Allow Portainer agent from data-bolino - managed by Ansible role portainer"
  when: inventory_hostname == 'web-bolino'

- name: Reload UFW
  ufw:
    state: reloaded
  when: inventory_hostname == 'web-bolino'
