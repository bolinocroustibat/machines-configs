# Storage media disk configuration
# storage_media__ssd_uuid: set in host_vars (blkid UUID of the ext4 partition) per host.
storage_media__mount_point: "/mnt/medias"
storage_media__owner: "{{ ansible_user }}"
storage_media__group: "media"

# Subdirectories of the mount to create (e.g. gdrive local roots). The Transmission
# download directory is created by the transmission role (transmission__download_dir).
storage_media__media_subdirs: []
