# Pi detection: vanilla Debian on Pi often has no Raspbian LSB / ansible_model; the kernel still exposes the board string in /proc/device-tree/model.
- name: Detect Raspberry Pi via device tree model
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - Raspberry Pi
      - /proc/device-tree/model
  changed_when: false
  failed_when: false
  register: raspberry__dt_pi_check

- name: Set Raspberry Pi applicability fact (shared by tasks and reboot handler)
  ansible.builtin.set_fact:
    raspberry__is_pi: "{{ (raspberry__dt_pi_check.rc | default(-1) | int) == 0 }}"

- name: Disable Wi-Fi in config.txt
  ansible.builtin.blockinfile:
    path: "{{ raspberry__config_path }}"
    block: |
      # Disable Wi-Fi (added by Ansible raspberry role)
      dtoverlay=disable-wifi
    marker: "# {mark} ANSIBLE raspberry disable-wifi"
    state: present
  become: true
  notify: Reboot Raspberry
  when: raspberry__is_pi | bool

- name: Disable Bluetooth in config.txt
  ansible.builtin.blockinfile:
    path: "{{ raspberry__config_path }}"
    block: |
      # Disable Bluetooth (added by Ansible raspberry role)
      dtoverlay=disable-bt
    marker: "# {mark} ANSIBLE raspberry disable-bt"
    state: present
  become: true
  notify: Reboot Raspberry
  when: raspberry__is_pi | bool

- name: Add Raspberry Pi kernel command line options
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    regexp: "^(?!.*(?:^| ){{ item | regex_escape }}(?: |$))(.*)$"
    line: '\1 {{ item }}'
    backrefs: true
  loop: "{{ raspberry__cmdline_options }}"
  become: true
  notify: Reboot Raspberry
  when:
    - raspberry__is_pi | bool
    - raspberry__cmdline_options | length > 0
