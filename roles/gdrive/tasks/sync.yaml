# Deploy sync_gdrive.sh (rclone bisync for cron; one-way copy for Transmission hook)
# Bisync propagates new/changed/deleted files in both directions between local and Google Drive.
# First run per pair uses --resync to establish a baseline; set gdrive__bisync_force_resync: true
# to rebaseline after errors. Manual override: GDRIVE_BISYNC_FORCE_RESYNC=1 sync_gdrive.sh

- name: Include main setup tasks
  ansible.builtin.include_tasks: main.yaml

- name: Include gdrive pair resolution
  ansible.builtin.include_tasks: resolve_sync_pairs.yaml

- name: Deploy sync_gdrive script at transmission hook path
  when: ansible_facts["os_family"] == "Debian"
  ansible.builtin.template:
    src: sync_gdrive.sh.j2
    dest: "{{ gdrive__transmission_hook_path }}"
    mode: u=rwx,g=rx,o= # 750
    owner: "{{ gdrive__script_user }}"
    group: "{{ gdrive__script_user }}"
  become: true

- name: Add cron job for regular bidirectional sync
  when:
    - ansible_facts["os_family"] == "Debian"
    - gdrive__cron_enabled | default(true) | bool
  ansible.builtin.cron:
    name: "Sync Google Drive media folders"
    minute: "0"
    hour: "*/4"  # Every 4 hours
    day: "*"
    month: "*"
    weekday: "*"
    job: >-
      {{ gdrive__transmission_hook_path }}
      >> {{ gdrive_script_user_ent.ansible_facts.getent_passwd[gdrive__script_user][4] }}/rclone_sync.log 2>&1
    user: "{{ gdrive__script_user }}"
  become: true
