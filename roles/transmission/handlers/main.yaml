- name: Reload nginx config
  # Run nginx -t first so failures show the real syntax/include error (systemctl reload hides it).
  ansible.builtin.shell: "{{ transmission__nginx_binary }} -t && systemctl reload nginx"
  args:
    executable: /bin/bash
  become: true

- name: Restart transmission-daemon
  ansible.builtin.service:
    name: transmission-daemon
    state: restarted
  become: true
