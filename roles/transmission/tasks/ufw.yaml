- name: Remove old Transmission UFW rules by comment
  ansible.builtin.shell: |
    # ufw status numbered has format "[ 3]" with spaces, so regex must handle that
    /usr/sbin/ufw status numbered | grep "{{ item.comment }}" \
      | sed -E 's/^[[:space:]]*\[[[:space:]]*([0-9]+)[[:space:]]*\].*/\1/' | sort -rn | while read num; do
      [ ! -z "$num" ] && echo "y" | /usr/sbin/ufw delete $num 2>/dev/null || true
    done
  loop:
    - { comment: "Allow Transmission web interface - managed by Ansible role transmission" }
    - { comment: "Allow Transmission peer connections - managed by Ansible role transmission" }
  become: true
  ignore_errors: true
  changed_when: false

- name: Allow Transmission web interface
  ansible.builtin.command:
    argv:
      - /usr/sbin/ufw
      - allow
      - "{{ transmission__rpc_port | default(9091) }}/tcp"
      - comment
      - "Allow Transmission web interface - managed by Ansible role transmission"
  register: transmission__ufw_rpc_cmd
  changed_when: "'Skipping adding existing rule' not in (transmission__ufw_rpc_cmd.stdout | default(''))"
  become: true

- name: Allow Transmission peer connections
  ansible.builtin.command:
    argv:
      - /usr/sbin/ufw
      - allow
      - "{{ transmission__peer_port | default(51413) }}/{{ transmission__peer_proto | default('tcp') }}"
      - comment
      - "Allow Transmission peer connections - managed by Ansible role transmission"
  register: transmission__ufw_peer_cmd
  changed_when: "'Skipping adding existing rule' not in (transmission__ufw_peer_cmd.stdout | default(''))"
  become: true

- name: Reload UFW
  ansible.builtin.command: /usr/sbin/ufw reload
  changed_when: false
  become: true
