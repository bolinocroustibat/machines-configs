- name: Install dnsutils for DNS checks
  apt:
    name: dnsutils
    state: present
    update_cache: true
  become: true

- name: Check if DNS is properly configured
  command: dig +short {{ transmission__domain }}
  register: transmission_dns_check
  changed_when: false
  failed_when: transmission_dns_check.stdout == ""
  become: true

# follow=true resolves live/*.pem symlinks to archive files (shell test -r was flaky with /bin/sh + symlinks).
- name: Stat Let's Encrypt fullchain (resolved path)
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ transmission__domain }}/fullchain.pem"
    follow: true
  register: transmission_le_fullchain
  become: true

- name: Stat Let's Encrypt privkey (resolved path)
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ transmission__domain }}/privkey.pem"
    follow: true
  register: transmission_le_privkey
  become: true

- name: Record whether to use TLS in nginx vhost (single boolean for template + Certbot)
  ansible.builtin.set_fact:
    transmission_le_tls_ready: "{{ transmission_le_fullchain.stat.exists | default(false) and transmission_le_privkey.stat.exists | default(false) }}"

- name: Ensure ACME webroot exists (HTTP-01 renewals)
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    owner: root
    group: root
    mode: u=rwx,g=rx,o=rx # 755
  become: true

# Requires nginx role (tasks_from: install) beforehand: nginx.conf must include sites-enabled.
- name: Deploy Nginx vhost for Transmission
  ansible.builtin.template:
    src: transmission_vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ transmission__domain }}.conf"
    mode: u=rw,g=r,o=r # 644
  become: true
  notify: Reload nginx config

- name: Enable Nginx vhost for Transmission
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ transmission__domain }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ transmission__domain }}.conf"
    state: link
    force: true
  become: true
  notify: Reload nginx config

# Apply nginx reload + transmission-daemon restart before Certbot:
# HTTP-01 needs the vhost live to answer /.well-known/acme-challenge/.
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Obtain certificate with Certbot (first time only)
  ansible.builtin.command: >-
    certbot --nginx -d {{ transmission__domain }}
    --non-interactive --agree-tos --email me@adriencarpentier.com
  args:
    creates: "/etc/letsencrypt/live/{{ transmission__domain }}/fullchain.pem"
  when:
    - transmission_dns_check.stdout != ""
    - not (transmission_le_tls_ready | bool)
  become: true
  ignore_errors: true
  register: transmission_certbot_obtain_result

- name: Display Certbot error if obtain failed
  ansible.builtin.debug:
    msg: >-
      Certbot failed (need DNS + port 80). stderr:
      {{ transmission_certbot_obtain_result.stderr_lines | default(['unknown']) }}
  when:
    - not (transmission_le_tls_ready | bool)
    - transmission_certbot_obtain_result.rc is defined
    - transmission_certbot_obtain_result.rc != 0
