- name: Install dnsutils for DNS checks
  apt:
    name: dnsutils
    state: present
    update_cache: true
  become: true

# Stock nginx default (32) breaks with several long server_name values (e.g. *.example.com vhosts + Certbot).
# Drop-in works when the main nginx.conf is not managed by roles/nginx (e.g. minimal Pi installs).
- name: Ensure nginx server_names_hash_bucket_size in conf.d
  ansible.builtin.copy:
    dest: /etc/nginx/conf.d/99-ansible-server-names-hash-bucket.conf
    mode: u=rw,g=r,o=r # 644
    content: |
      {{ ansible_managed | comment }}

      server_names_hash_bucket_size 128;
  notify: Reload nginx config
  become: true

- name: Check if DNS is properly configured
  command: dig +short {{ transmission__domain }}
  register: transmission_dns_check
  changed_when: false
  failed_when: transmission_dns_check.stdout == ""
  become: true

- name: Check if SSL certificate exists
  stat:
    path: "/etc/letsencrypt/live/{{ transmission__domain }}/fullchain.pem"
  register: transmission_ssl_cert_exists
  become: true

- name: Deploy Nginx vhost for Transmission (only if SSL doesn't exist)
  template:
    src: transmission_vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ transmission__domain }}.conf"
    mode: u=rw,g=r,o=r  # 644
  notify: Reload nginx config
  when: not transmission_ssl_cert_exists.stat.exists
  become: true

- name: Enable Nginx vhost for Transmission (only if SSL doesn't exist)
  file:
    src: "/etc/nginx/sites-available/{{ transmission__domain }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ transmission__domain }}.conf"
    state: link
    force: true
  notify: Reload nginx config
  when: not transmission_ssl_cert_exists.stat.exists
  become: true

# Load HTTP-only vhost before Certbot mutates nginx (avoids a broken partial state if Certbot fails).
- name: Apply nginx reload before Certbot
  ansible.builtin.meta: flush_handlers
  when: not transmission_ssl_cert_exists.stat.exists

- name: Configure SSL with Certbot (only if SSL doesn't exist)
  ansible.builtin.command: certbot --nginx -d {{ transmission__domain }} --non-interactive --agree-tos --email me@adriencarpentier.com
  args:
    creates: "/etc/letsencrypt/live/{{ transmission__domain }}/fullchain.pem"
  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  when: transmission_dns_check.stdout != "" and not transmission_ssl_cert_exists.stat.exists
  become: true
  ignore_errors: true
  register: transmission_certbot_result

- name: Display Certbot error if failed
  debug:
    msg: >-
      Certbot failed. Check DNS configuration and firewall rules
      (HTTP port 80 must be open). Error: {{ transmission_certbot_result.stderr_lines | default(['Unknown error']) }}
  when: transmission_certbot_result.rc is defined and transmission_certbot_result.rc != 0

- name: Verify nginx configuration after Certbot
  ansible.builtin.command:
    argv:
      - "{{ transmission__nginx_binary }}"
      - -t
  register: transmission__nginx_t_after_certbot
  changed_when: false
  failed_when: transmission__nginx_t_after_certbot.rc != 0
  become: true
  when: transmission_dns_check.stdout != "" and not transmission_ssl_cert_exists.stat.exists
