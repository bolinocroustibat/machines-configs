- name: Install transmission-daemon package and stop service
  ansible.builtin.import_tasks: install_package.yaml

- name: Add Transmission user to media group
  when: ansible_facts["os_family"] == "Debian"
  become: true
  ansible.builtin.user:
    name: debian-transmission
    groups: "{{ storage_media__group | default('media') }}"
    append: true

- name: Ensure Transmission download directory exists
  when: ansible_facts["os_family"] == "Debian"
  become: true
  ansible.builtin.file:
    path: "{{ transmission__download_dir }}"
    state: directory
    owner: debian-transmission
    group: "{{ storage_media__group | default('media') }}"
    mode: u=rwx,g=rwxs,o=rx # 2775

- name: Deploy Transmission settings.json
  when: ansible_facts["os_family"] == "Debian"
  template:
    src: settings.json.j2
    dest: /etc/transmission-daemon/settings.json
    mode: u=rw,g=r,o=r  # 644
    owner: debian-transmission
    group: debian-transmission
  become: true
  notify: Restart transmission-daemon

- name: Ensure transmission-daemon service is enabled and running (Debian)
  when: ansible_facts["os_family"] == "Debian"
  become: true
  service:
    name: transmission-daemon
    enabled: "{{ transmission__service_enabled }}"
    state: "{{ transmission__service_state }}"
