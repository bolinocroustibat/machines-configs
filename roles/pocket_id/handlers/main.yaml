- name: Reload nginx config
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: Recreate pocket-id container
  # Equivalent to: docker compose up -d --force-recreate
  community.docker.docker_compose_v2:
    project_src: "/opt/pocket-id"
    state: present
    remove_orphans: true
    build: "never"
    pull: "always"
    recreate: always
