- name: Include Pocket ID secrets
  include_vars: secrets.yaml

- name: Ensure Pocket ID directory exists
  file:
    path: "/opt/pocket-id"
    state: directory
    mode: u=rwx,g=,o= # 700 (only the user can read, write and execute)

- name: Copy .env
  template:
    src: .env.j2
    dest: "/opt/pocket-id/.env"
    mode: u=rw,g=,o= # 600

- name: Copy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "/opt/pocket-id/docker-compose.yml"
    mode: u=rw,g=r,o=r # 644

- name: Stop and remove existing Pocket ID container
  community.docker.docker_container:
    name: pocket-id
    state: absent
  ignore_errors: true

- name: Recreate Pocket ID container with new image
  community.docker.docker_compose_v2:
    project_src: "/opt/pocket-id"
    state: present
    remove_orphans: true
    build: "never"
    pull: "always"
    recreate: always
